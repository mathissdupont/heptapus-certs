<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="877" viewBox="0 0 1240 877">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="headerLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="60%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#2563EB" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="1240" height="877" fill="#FFFFFF"/>

  <!-- Left blue accent bar -->
  <rect x="0" y="0" width="8" height="877" fill="url(#accent)"/>

  <!-- Top right corner accent -->
  <rect x="1200" y="0" width="40" height="8" fill="#2563EB"/>
  <rect x="1232" y="0" width="8" height="60" fill="#2563EB"/>

  <!-- Bottom left corner accent -->
  <rect x="0" y="869" width="40" height="8" fill="#2563EB"/>
  <rect x="0" y="817" width="8" height="60" fill="#2563EB"/>

  <!-- Subtle background lines -->
  <line x1="8" y1="160" x2="1240" y2="160" stroke="#F1F5F9" stroke-width="1"/>
  <line x1="8" y1="720" x2="1240" y2="720" stroke="#F1F5F9" stroke-width="1"/>

  <!-- Top header section -->
  <rect x="8" y="0" width="1232" height="155" fill="#F8FAFC"/>

  <!-- Brand accent in header -->
  <rect x="8" y="0" width="4" height="155" fill="#2563EB"/>

  <!-- Title text -->
  <text x="90" y="60" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="5" fill="#2563EB">HEPTACERT</text>
  <text x="90" y="110" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" letter-spacing="3" fill="#0F172A">Katılım Sertifikası</text>
  <line x1="90" y1="130" x2="560" y2="130" stroke="#2563EB" stroke-width="2"/>
  <text x="90" y="148" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#64748B" letter-spacing="1">CERTIFICATE OF PARTICIPATION</text>

  <!-- "This certifies that" -->
  <text x="90" y="230" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748B" letter-spacing="0.5">Aşağıdaki kişinin</text>
  <text x="90" y="255" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748B" letter-spacing="0.5">etkinliğe katılımını belgeleriz.</text>

  <!-- Name area hint line (name placed by config at y≈438) -->
  <line x1="90" y1="490" x2="760" y2="490" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Bottom section divider -->
  <line x1="90" y1="600" x2="1150" y2="600" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Signature area left -->
  <line x1="90" y1="680" x2="350" y2="680" stroke="#CBD5E1" stroke-width="1"/>
  <text x="90" y="700" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="1">KURUM YETKİLİSİ</text>

  <!-- Signature area center -->
  <line x1="490" y1="680" x2="750" y2="680" stroke="#CBD5E1" stroke-width="1"/>
  <text x="490" y="700" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#94A3B8" letter-spacing="1">TARİH</text>

  <!-- QR area hint (placed at bottom-left by config) -->
  <rect x="90" y="720" width="110" height="110" fill="none" stroke="#E2E8F0" stroke-width="1" rx="4"/>

  <!-- Cert ID area (placed at y≈800 by config) -->
  <text x="240" y="800" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#CBD5E1" letter-spacing="1">SERTİFİKA NO:</text>

  <!-- Right side decorative element -->
  <circle cx="1100" cy="438" r="180" fill="none" stroke="#F1F5F9" stroke-width="1"/>
  <circle cx="1100" cy="438" r="140" fill="none" stroke="#F1F5F9" stroke-width="1"/>
  <circle cx="1100" cy="438" r="100" fill="none" stroke="#EFF6FF" stroke-width="1.5"/>
  <circle cx="1100" cy="438" r="50" fill="#EFF6FF"/>
  <text x="1100" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" fill="#BFDBFE" text-anchor="middle">✓</text>
  <text x="1100" y="455" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#93C5FD" text-anchor="middle" letter-spacing="1">VERIFIED</text>
</svg>
