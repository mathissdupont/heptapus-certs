<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="877" viewBox="0 0 1240 877">
  <defs>
    <linearGradient id="greenBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0FDF4"/>
      <stop offset="100%" style="stop-color:#DCFCE7"/>
    </linearGradient>
    <linearGradient id="emeraldHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#065F46"/>
      <stop offset="50%" style="stop-color:#047857"/>
      <stop offset="100%" style="stop-color:#065F46"/>
    </linearGradient>
    <linearGradient id="emeraldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="50%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D97706"/>
      <stop offset="50%" style="stop-color:#FBBF24"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <filter id="eShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#065F46" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1240" height="877" fill="url(#greenBg)"/>

  <!-- Subtle diagonal pattern -->
  <pattern id="diagLines" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="20" stroke="#10B981" stroke-width="0.3" stroke-opacity="0.15"/>
  </pattern>
  <rect width="1240" height="877" fill="url(#diagLines)"/>

  <!-- Outer border -->
  <rect x="16" y="16" width="1208" height="845" fill="none" stroke="#10B981" stroke-width="2.5" rx="4"/>
  <rect x="24" y="24" width="1192" height="829" fill="none" stroke="#10B981" stroke-width="0.8" rx="2" stroke-opacity="0.5"/>

  <!-- Corner accents -->
  <rect x="16" y="16" width="50" height="6" fill="url(#emeraldLine)" rx="2"/>
  <rect x="16" y="16" width="6" height="50" fill="url(#emeraldLine)" rx="2"/>
  <rect x="1174" y="16" width="50" height="6" fill="url(#emeraldLine)" rx="2"/>
  <rect x="1218" y="16" width="6" height="50" fill="url(#emeraldLine)" rx="2"/>
  <rect x="16" y="855" width="50" height="6" fill="url(#emeraldLine)" rx="2"/>
  <rect x="16" y="811" width="6" height="50" fill="url(#emeraldLine)" rx="2"/>
  <rect x="1174" y="855" width="50" height="6" fill="url(#emeraldLine)" rx="2"/>
  <rect x="1218" y="811" width="6" height="50" fill="url(#emeraldLine)" rx="2"/>

  <!-- Emerald header -->
  <rect x="16" y="16" width="1208" height="175" fill="url(#emeraldHeader)" rx="4" filter="url(#eShadow)"/>
  <rect x="16" y="185" width="1208" height="6" fill="url(#goldLine)"/>

  <!-- Header content -->
  <text x="620" y="68" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="5" fill="#6EE7B7" text-anchor="middle">HEPTACERT</text>

  <!-- Leaf / star decorations in header -->
  <text x="200" y="125" font-family="Georgia, serif" font-size="32" fill="#34D399" fill-opacity="0.3" text-anchor="middle">❧</text>
  <text x="1040" y="125" font-family="Georgia, serif" font-size="32" fill="#34D399" fill-opacity="0.3" text-anchor="middle">❧</text>

  <text x="620" y="125" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" letter-spacing="2" fill="#FFFFFF" text-anchor="middle">KATILIM SERTİFİKASI</text>
  <text x="620" y="162" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" letter-spacing="5" fill="#6EE7B7" text-anchor="middle">CERTIFICATE OF PARTICIPATION</text>

  <!-- "This certifies" -->
  <text x="620" y="255" font-family="Georgia, serif" font-size="15" fill="#064E3B" text-anchor="middle" font-style="italic">Sayın</text>

  <!-- Name area (config places name at y=438) -->
  <rect x="180" y="395" width="880" height="90" rx="6" fill="#065F46" fill-opacity="0.06" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.4"/>

  <!-- Name underline -->
  <line x1="200" y1="490" x2="1040" y2="490" stroke="#10B981" stroke-width="1.5"/>
  <line x1="350" y1="494" x2="890" y2="494" stroke="#D97706" stroke-width="0.8"/>

  <!-- "participation text" -->
  <text x="620" y="545" font-family="Georgia, serif" font-size="14" fill="#065F46" text-anchor="middle" font-style="italic">adlı katılımcının bu etkinliğe katılımı tescil edilmiştir.</text>

  <!-- Center emerald seal -->
  <g transform="translate(620, 630)">
    <circle cx="0" cy="0" r="48" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#10B981" stroke-width="0.8" stroke-dasharray="3,2"/>
    <circle cx="0" cy="0" r="25" fill="#D1FAE5"/>
    <!-- Checkmark -->
    <path d="M-12,2 L-4,10 L14,-8" stroke="#065F46" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Signature lines -->
  <line x1="110" y1="728" x2="380" y2="728" stroke="#10B981" stroke-width="1"/>
  <text x="245" y="746" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle" letter-spacing="1.5">YETKİLİ İMZASI</text>

  <line x1="860" y1="728" x2="1130" y2="728" stroke="#10B981" stroke-width="1"/>
  <text x="995" y="746" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#6B7280" text-anchor="middle" letter-spacing="1.5">TARİH</text>

  <!-- Bottom footer bar -->
  <rect x="16" y="798" width="1208" height="63" fill="#065F46" fill-opacity="0.06"/>
  <line x1="16" y1="798" x2="1224" y2="798" stroke="url(#goldLine)" stroke-width="1.5"/>

  <!-- Cert ID area hint -->
  <text x="620" y="826" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#6EE7B7" fill-opacity="0.5" text-anchor="middle" letter-spacing="2">SERTİFİKA NO</text>

  <!-- QR placeholder bottom-left -->
  <rect x="80" y="760" width="95" height="95" rx="4" fill="white" stroke="#10B981" stroke-width="0.8" stroke-opacity="0.5"/>
</svg>
