      background-size: 100% 100%;
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
      overflow: hidden;
    }

    .document-title {
      position: absolute;
      top: 38mm;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 18pt;
      font-weight: 700;
      line-height: 1.2;
    }

    .meta-row {
      position: absolute;
      top: 50mm;
      left: 25mm;
      right: 25mm;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10.5pt;
      font-weight: 700;
    }

    .content {
      position: absolute;
      top: 72mm;
      left: 25mm;
      right: 25mm;
      bottom: 32mm;
      font-size: 11.5pt;
      line-height: 1.55;
      overflow: hidden;
    }

    .content p {
      margin: 0 0 10px 0;
      text-align: justify;
    }

    .certificate-box {
      margin-top: 22mm;
      text-align: center;
    }

    .recipient-name {
      margin: 8mm 0 4mm;
      font-size: 24pt;
      font-weight: 700;
      letter-spacing: .2px;
    }

    .certificate-description {
      max-width: 135mm;
      margin: 0 auto;
      font-size: 12.5pt;
      line-height: 1.6;
      text-align: center;
    }

    .official-output {
      font-size: 10.5pt;
      line-height: 1.45;
    }

    .official-output h2 {
      margin: 0 0 8px;
      font-size: 13pt;
    }

    .official-output table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      table-layout: fixed;
    }

    .official-output th,
    .official-output td {
      border: 1px solid #222;
      padding: 5px 6px;
      vertical-align: top;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .official-output th {
      background: rgba(0, 0, 0, .06);
      font-weight: 700;
      text-align: left;
    }

    .signature-row {
      position: absolute;
      left: 25mm;
      right: 25mm;
      bottom: 43mm;
      display: flex;
      justify-content: space-between;
      gap: 18mm;
      font-size: 10.5pt;
      text-align: center;
    }

    .signature {
      width: 60mm;
      padding-top: 10mm;
      border-top: 1px solid #222;
    }

    .signature strong { display: block; }

    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      html, body {
        width: 210mm;
        height: 297mm;
        background: #fff;
      }
      .page {
        margin: 0;
        width: 210mm;
        height: 297mm;
        box-shadow: none;
        page-break-after: always;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1 class="document-title">{{title}}</h1>

    <section class="meta-row" aria-label="Document metadata">
      <div>Date: <span>{{date}}</span></div>
      <div>Document No: <span>{{documentNo}}</span></div>
    </section>

    <section class="content">
      <div class="official-output">
        {{bodyHtml}}
      </div>
    </section>

    <section class="signature-row" aria-label="Signature fields">
      <div class="signature">
        <strong>{{leftSignerName}}</strong>
        <span>{{leftSignerTitle}}</span>
      </div>
      <div class="signature">
        <strong>{{rightSignerName}}</strong>
        <span>{{rightSignerTitle}}</span>
      </div>
    </section>
  </main>
</body>
</html>
