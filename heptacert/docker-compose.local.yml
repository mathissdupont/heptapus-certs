services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heptacert}
      POSTGRES_USER: ${POSTGRES_USER:-heptacert}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heptacert}
    volumes:
      - postgres_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heptacert} -d ${POSTGRES_DB:-heptacert}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-heptacert}:${POSTGRES_PASSWORD:-heptacert}@db:5432/${POSTGRES_DB:-heptacert}
      ALEMBIC_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-heptacert}:${POSTGRES_PASSWORD:-heptacert}@db:5432/${POSTGRES_DB:-heptacert}
      JWT_SECRET: ${JWT_SECRET:-local-jwt-secret-change-me-at-least-32-chars}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-1440}
      BOOTSTRAP_SUPERADMIN_EMAIL: ${BOOTSTRAP_SUPERADMIN_EMAIL:-superadmin@example.com}
      BOOTSTRAP_SUPERADMIN_PASSWORD: ${BOOTSTRAP_SUPERADMIN_PASSWORD:-StrongSuperAdminPass123!}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8765}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3030}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3030}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      STORAGE_MODE: local
      LOCAL_STORAGE_DIR: /data
      EMAIL_TOKEN_SECRET: ${EMAIL_TOKEN_SECRET:-local-email-token-secret-change-me}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-"HeptaCert Local <noreply@example.com>"}
      PAYMENT_ENABLED: ${PAYMENT_ENABLED:-false}
      ACTIVE_PAYMENT_PROVIDER: ${ACTIVE_PAYMENT_PROVIDER:-iyzico}
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      PAYTR_MERCHANT_ID: ${PAYTR_MERCHANT_ID:-}
      PAYTR_MERCHANT_KEY: ${PAYTR_MERCHANT_KEY:-}
      PAYTR_MERCHANT_SALT: ${PAYTR_MERCHANT_SALT:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-false}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_POOL_MAX_OVERFLOW: ${DB_POOL_MAX_OVERFLOW:-5}
      DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-15}
      DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
    volumes:
      - storage_local:/data
    ports:
      - "${BACKEND_PORT:-8765}:8000"
    command: sh -lc "python -m src.local_bootstrap && alembic stamp head && uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8765/api}
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8765/api}
    ports:
      - "${FRONTEND_PORT:-3030}:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_local:
  storage_local:
