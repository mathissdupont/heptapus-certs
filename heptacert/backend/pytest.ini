[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers -x
markers =
    unit: Pure unit tests (no DB/IO)
    integration: Tests that interact with DB or external services
