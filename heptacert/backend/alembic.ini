[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Use ALEMBIC_DATABASE_URL env var (sync psycopg) for Alembic CLI
# In docker-compose, this is set alongside DATABASE_URL (asyncpg).
# This will be overridden by env.py using ALEMBIC_DATABASE_URL env var
sqlalchemy.url = postgresql+psycopg://user:pass@localhost/heptacert

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
